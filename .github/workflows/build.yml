name: Build PwnBullseye4 Images

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture to build (leave empty for both)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - armhf
          - arm64

env:
  PIGEN_REPO: https://github.com/RPi-Distro/pi-gen.git
  PIGEN_BRANCH: bullseye

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: armhf
            img_suffix: armhf
            description: "32-bit Bullseye (Pi 0 & Pi 02W)"
          - arch: arm64
            img_suffix: arm64
            description: "64-bit Bullseye (Pi 02W)"
    steps:
      - name: Check if this arch should build
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ -n "${{ inputs.arch }}" ] && \
             [ "${{ inputs.arch }}" != "${{ matrix.arch }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.arch }} (user requested ${{ inputs.arch }} only)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Building ${{ matrix.arch }}"
          fi

      - name: Checkout repository
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Free up disk space
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "=== Disk before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo apt-get -y purge google-cloud-* dotnet-* aspnetcore-* 2>/dev/null || true
          sudo apt-get -y autoremove 2>/dev/null || true
          sudo apt-get clean
          echo "=== Disk after cleanup ==="
          df -h /

      - name: Install build dependencies
        if: steps.check.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-static debootstrap \
            zerofree zip dosfstools libarchive-tools libcap2-bin \
            rsync grep udev xz-utils curl xxd file kmod bc \
            binfmt-support ca-certificates fdisk gpg pigz \
            arch-test qemu-utils

      - name: Set up QEMU binfmt
        if: steps.check.outputs.skip != 'true'
        run: |
          # Ensure both ARM 32-bit and ARM 64-bit binary execution work via QEMU
          sudo update-binfmts --enable qemu-arm || true
          sudo update-binfmts --enable qemu-aarch64 || true
          
          echo "=== Registered binfmts ==="
          ls -la /proc/sys/fs/binfmt_misc/ || true

      - name: Clone pi-gen (bullseye branch)
        if: steps.check.outputs.skip != 'true'
        run: |
          git clone --depth 1 --branch "$PIGEN_BRANCH" "$PIGEN_REPO" pi-gen
          echo "Pi-gen cloned at $(cd pi-gen && git log -1 --format='%h %s')"

      - name: Clone jayofelony pwnagotchi repo
        if: steps.check.outputs.skip != 'true'
        run: |
          git clone --depth 1 https://github.com/jayofelony/pwnagotchi.git pwnagotchi_src
          echo "Pwnagotchi cloned"

      - name: Apply patches to pi-gen
        if: steps.check.outputs.skip != 'true'
        run: |
          # Fix on_chroot to use plain chroot (not capsh)
          chmod +x build/patches/*.sh
          bash build/patches/01-on-chroot-fix.sh pi-gen

          # Set up stage structure using official jayofelony stage3 and PWNGHOST-RS overlays
          bash build/patches/02-stage-setup.sh pi-gen "$(pwd)/pwnagotchi_src/stage3"

          # Fix pi-gen export-image prerun.sh invalid ext4 feature
          bash build/patches/03-export-image-fix.sh pi-gen

          # Inject OS Optimizations
          bash build/patches/04-os-optimizations.sh pi-gen

          # Verify stage3 is copied
          ls -la pi-gen/stage3/

      - name: Write pi-gen config
        if: steps.check.outputs.skip != 'true'
        run: |
          if [ -f "build/configs/config-${{ matrix.arch }}" ]; then
            cp "build/configs/config-${{ matrix.arch }}" pi-gen/config
          else
            cp build/config pi-gen/config
            echo "ARCH=\"${{ matrix.arch }}\"" >> pi-gen/config
          fi

          echo "=== Target Config (${{ matrix.arch }}) ==="
          cat pi-gen/config

      - name: Build image with pi-gen natively (NO Docker)
        if: steps.check.outputs.skip != 'true'
        run: |
          cd pi-gen

          # Make all scripts executable
          find . -name "*.sh" -exec chmod +x {} \;

          echo "=== Running pi-gen native build.sh ==="
          sudo ./build.sh

      - name: Locate and rename output image
        if: steps.check.outputs.skip != 'true'
        id: image
        run: |
          echo "=== Looking for built images ==="
          find pi-gen/deploy -name "*.img*" -o -name "*.zip" 2>/dev/null | head -20

          IMG=$(find pi-gen/deploy -name "*.img.xz" -o -name "*.img.gz" -o -name "*.img.zip" | head -1)

          if [ -z "$IMG" ]; then
            IMG=$(find pi-gen/deploy -name "*.img" | head -1)
            if [ -n "$IMG" ]; then
              echo "Compressing image..."
              xz -9 -T0 "$IMG"
              IMG="${IMG}.xz"
            fi
          fi

          if [ -z "$IMG" ]; then
            echo "ERROR: No image found in deploy/"
            find pi-gen/deploy -type f
            exit 1
          fi

          DATE=$(date +%Y%m%d)
          FINAL_NAME="pwnbullseye4-${{ matrix.img_suffix }}-${DATE}.img.xz"
          cp "$IMG" "${FINAL_NAME}"

          echo "image_path=${FINAL_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_name=${FINAL_NAME}" >> "$GITHUB_OUTPUT"

          sha256sum "${FINAL_NAME}" > "${FINAL_NAME}.sha256"
          echo "sha256_path=${FINAL_NAME}.sha256" >> "$GITHUB_OUTPUT"

          echo "=== Built: ${FINAL_NAME} ==="
          ls -lh "${FINAL_NAME}"
          cat "${FINAL_NAME}.sha256"

      - name: Upload image artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pwnbullseye4-${{ matrix.img_suffix }}
          path: |
            ${{ steps.image.outputs.image_path }}
            ${{ steps.image.outputs.sha256_path }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: PwnBullseye4 Build ${{ github.run_number }}
          body: |
            ## PwnBullseye4 Build ${{ github.run_number }}

            Built from commit ${{ github.sha }}

            ### Included Bullseye Images
            | Image | Architecture | Device Target |
            |-------|-------------|---------------|
            | `pwnbullseye4-armhf-*.img.xz` | 32-bit (`armhf`) | Raspberry Pi Zero W / Pi Zero 2 W |
            | `pwnbullseye4-arm64-*.img.xz` | 64-bit (`arm64`) | Raspberry Pi Zero 2 W |

            ### System Integrity Features Ported from PWNGHOST-RS:
            - **ZRAM Data/Log Mounts**: Eliminates SD-card write churn and prevents corruption.
            - **Safe Shutdown Handler**: Clean unmount & sync before power-off.
            - **WLAN Keepalive**: Monitors and auto-recovers wireless monitor mode.
            - **BT PAN Tethering**: Systemd managed Bluetooth pairing and network sharing daemons.

            ### Flash Instructions
            ```bash
            xzcat pwnbullseye4-*.img.xz | sudo dd of=/dev/sdX bs=4M status=progress
            ```

            ### Default credentials
            - User: `pi` / Password: `raspberry`
            - SSH enabled by default
          files: |
            pwnbullseye4-*.img.xz
            pwnbullseye4-*.sha256
          draft: false
          prerelease: false
